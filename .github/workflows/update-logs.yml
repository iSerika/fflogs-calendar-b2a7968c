name: Update FFLogs calendar data

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: update-fflogs-calendar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Sync Personal Logs
        env:
          FFLOGS_CLIENT_ID: ${{ secrets.FFLOGS_CLIENT_ID }}
          FFLOGS_CLIENT_SECRET: ${{ secrets.FFLOGS_CLIENT_SECRET }}
          FFLOGS_REFRESH_TOKEN: ${{ secrets.FFLOGS_REFRESH_TOKEN }}
        run: npm run sync-personal-api

      - name: Fetch FFLogs data
        env:
          FFLOGS_CLIENT_ID: ${{ secrets.FFLOGS_CLIENT_ID }}
          FFLOGS_CLIENT_SECRET: ${{ secrets.FFLOGS_CLIENT_SECRET }}
        run: npm run fetch

      - name: Validate generated data
        run: npm run validate

      - name: Commit generated data
        run: |
          git config user.name "fflogs-calendar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add config/reports.json data/calendar-data.json data/calendar-data.js
          if git diff --cached --quiet; then
            echo "No generated data changes."
          else
            git commit -m "Update FFLogs calendar data"
            git push
          fi

      - name: Publish static site branch
        run: |
          rm -rf public-dist
          mkdir -p public-dist/assets public-dist/data
          cp index.html public-dist/
          cp robots.txt public-dist/
          cp .nojekyll public-dist/
          cp assets/* public-dist/assets/
          cp data/admin-config.js public-dist/data/
          cp data/calendar-data.js public-dist/data/
          cp data/manual-overrides.json public-dist/data/
          cd public-dist
          git init
          git checkout -b gh-pages
          git config user.name "fflogs-calendar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .
          git commit -m "Publish static site"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
